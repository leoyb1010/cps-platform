name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: 前端 (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript 严格检查
        run: npx tsc -p tsconfig.app.json --noEmit --noUnusedLocals
      - name: 单元测试 (Vitest)
        run: npm test
      - name: 生产构建
        run: npm run build

  server:
    name: 后端 (build + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Schema 同步校验 (sqlite ↔ postgres)
        run: sh scripts/check-schema-sync.sh
      - name: Prisma 生成 + 建表 (sqlite)
        run: npx prisma generate && npx prisma db push --skip-generate
        env:
          DATABASE_URL: file:./dev.db
          PRISMA_HIDE_UPDATE_MESSAGE: "1"
          RUST_LOG: info
      - name: 构建
        run: npm run build
      - name: e2e (独立 test.db, 自建+灌种子)
        run: npm test
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci-access-secret-not-for-prod-xxxxx
          JWT_REFRESH_SECRET: ci-refresh-secret-not-for-prod-xxxxx

  pg-schema:
    name: PostgreSQL schema 校验
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: 校验 PG schema 合法
        run: npx prisma validate --schema prisma/schema.postgres.prisma
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db

  e2e:
    name: 端到端 (Playwright · 真实浏览器)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 安装 Chromium
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E (mock 模式, webServer 自动起前端)
        run: npm run test:e2e
      - name: 上传报告（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-audit:
    name: 依赖漏洞扫描 (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # 前端无 high 漏洞 → 阻断
      - name: 前端依赖审计（high 阻断）
        run: npm audit --audit-level=high
      # 后端已清零已知漏洞，新增 moderate+ 一律阻断，避免资金/权限链路带病进入 main。
      - name: 后端依赖审计（moderate 阻断）
        working-directory: server
        run: npm audit --audit-level=moderate
