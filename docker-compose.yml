# 网易有道 CPS 平台 — 一键启动（后端 NestJS + 前端 Nginx）
# 用法：  docker compose up --build       → 打开 http://localhost:8080
services:
  server:
    build: ./server
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/prod.db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET 必填：openssl rand -hex 32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET 必填：openssl rand -hex 32}
      ACCESS_TTL: 900s
      REFRESH_TTL_DAYS: "14"
      PORT: "3001"
      # 经 nginx /api 反代，cookie 走根路径
      REFRESH_COOKIE_PATH: /
      # 浏览器实际访问的是 web 容器同源，CORS 同源即可；放开本地两个口便于直连调试
      CORS_ORIGIN: http://localhost:8080,http://localhost:5273
    volumes:
      - cps-db:/data
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '8080:80'
    restart: unless-stopped

volumes:
  cps-db:
