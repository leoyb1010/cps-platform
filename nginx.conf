server {
  # nginx-unprivileged 以非 root 运行，只能绑非特权端口 → 8080
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip 压缩：451KB 主包裸传太重，压后 ~140KB
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/woff2;

  # 安全响应头（main.ts 的 helmet 关了 CSP 交给此处；补齐基础头）
  # 注意：nginx add_header 不向带自己 add_header 的 location 继承 → 下方 /assets/、
  #       /index.html 里必须逐块重复这些头，否则静态资源/首页会丢安全头。
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # CSP：同源脚本/样式；连接放开同源 API；图片允许 data:（内联 webp/svg）。
  # 若接入第三方(埋点/字体CDN)，在此按域名放行。
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # 静态资源长缓存（文件名带 hash，可安全 immutable）
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    # 重复 server 级安全头（本 location 有 add_header，不再继承上面的）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  }

  # 首页永不缓存：index.html 引用带 hash 的 assets，若被缓存会指向旧 chunk 白屏
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    # 同理重复安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  }

  # /metrics 含进程/业务指标，不应经公网 nginx 暴露；Prometheus 从内网直连 server:3001 抓取。
  # 精确匹配优先于 /api/ 前缀，拦在反代之前。
  location = /api/metrics {
    deny all;
    return 403;
  }

  # API 反向代理 → 后端服务（保留 /auth、/members 等路径前缀）
  location /api/ {
    proxy_pass http://server:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;
    # 请求体上限（防超大请求）
    client_max_body_size 2m;
  }

  # SPA 回退
  location / {
    try_files $uri $uri/ /index.html;
  }
}
